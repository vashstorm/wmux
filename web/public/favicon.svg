<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Wmux">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#64748b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="60" y="60" width="904" height="904" rx="200" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Window chrome -->
  <rect x="180" y="200" width="664" height="624" rx="32" fill="#f8fafc" stroke="#cbd5e1" stroke-width="14"/>

  <!-- Title bar -->
  <rect x="180" y="200" width="664" height="72" rx="32" fill="#f1f5f9"/>
  <rect x="180" y="232" width="664" height="40" fill="#f1f5f9"/>

  <!-- Traffic-light dots (outline only) -->
  <circle cx="244" cy="236" r="16" fill="none" stroke="#cbd5e1" stroke-width="10"/>
  <circle cx="300" cy="236" r="16" fill="none" stroke="#cbd5e1" stroke-width="10"/>
  <circle cx="356" cy="236" r="16" fill="none" stroke="#cbd5e1" stroke-width="10"/>

  <!-- Vertical divider -->
  <line x1="504" y1="272" x2="504" y2="824" stroke="#cbd5e1" stroke-width="14"/>

  <!-- Horizontal divider (right column only) -->
  <line x1="504" y1="548" x2="844" y2="548" stroke="#cbd5e1" stroke-width="14"/>

  <!-- Green ">" prompt in left pane -->
  <path d="M268 448 L352 512 L268 576" fill="none" stroke="#22c55e" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor bar in bottom-right pane -->
  <rect x="546" y="614" width="88" height="20" rx="10" fill="#94a3b8"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Wmux">
  <!-- Squircle background -->
  <rect x="48" y="48" width="928" height="928" rx="220" fill="#111827"/>

  <!-- Bold geometric W -->
  <polyline
    points="168,300 330,740 512,468 694,740 856,300"
    fill="none"
    stroke="#e8f0fe"
    stroke-width="96"
